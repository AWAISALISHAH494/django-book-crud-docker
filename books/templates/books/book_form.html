{% extends 'books/base.html' %}

{% block title %}Book Form{% endblock %}   <!-- Optional: changes browser tab -->

{% block page_title %}{{ title }}{% endblock %}   <!-- Changes the h1 -->

{% block content %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'book_list' %}">Cancel</a>
</form>
{% endblock %}
