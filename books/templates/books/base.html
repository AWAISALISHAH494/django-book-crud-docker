<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}My Books{% endblock %}</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin-top: 20px; 
        }
        th, td { 
            border: 1px solid #ccc; 
            padding: 10px; 
            text-align: left; 
        }
        .actions a { 
            margin-right: 12px; 
            color: blue; 
        }
    </style>
</head>
<body>
    <h1>{% block page_title %}My Books{% endblock %}</h1>
    
    {% block content %}
    {% endblock %}
</body>
</html>
